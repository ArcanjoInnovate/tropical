name: tclub
description: "TCLUB - O app de eventos e entretenimento para todos os gostos!"
publish_to: "none"

version: 1.0.1+2

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  firebase_core: ^4.7.0
  firebase_app_check: ^0.4.3
  firebase_auth: ^6.4.0
  device_info_plus: ^12.4.0
  connectivity_plus: ^6.0.5
  firebase_database: ^12.3.0
  firebase_storage: ^13.3.0
  firebase_messaging: ^16.2.0
  cloud_functions: ^6.2.0
  flutter_local_notifications: ^17.2.3

  google_places_flutter: ^2.0.9

  google_sign_in: ^7.2.0
  google_maps_flutter: ^2.5.0
  geolocator: ^14.0.2

  video_compress: ^3.1.3
  video_player: ^2.9.5

  ffmpeg_kit_flutter_new: ^4.1.0
  camera: ^0.12.0+1
  image_picker: ^1.1.2
  get: ^4.6.6

  path_provider: ^2.1.5
  intl: ^0.20.2
  shared_preferences: ^2.3.4
  provider: ^6.1.2
  permission_handler: ^12.0.1
  flutter_cache_manager: ^3.4.1
  cached_network_image: ^3.4.1
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8
  dartz: ^0.10.1
  get_it: ^9.2.1
  url_launcher: ^6.3.2
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/tabu_logo.png
    - assets/logo.png
    - assets/logo_no_bg.png

flutter_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"